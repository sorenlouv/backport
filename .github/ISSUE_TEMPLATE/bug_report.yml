name: Bug report
description: Report a problem with the backport CLI
labels: ['bug']
body:
  - type: input
    id: backport-version
    attributes:
      label: Backport version
      description: Output of `backport --version`
      placeholder: '12.0.0'
    validations:
      required: true

  - type: input
    id: node-version
    attributes:
      label: Node.js version
      description: Output of `node --version`
      placeholder: 'v22.0.0'
    validations:
      required: true

  - type: input
    id: command
    attributes:
      label: Command
      description: The exact command you ran
      placeholder: 'backport --branch 8.x --pr 1234'
    validations:
      required: true

  - type: textarea
    id: config
    attributes:
      label: Configuration
      description: >-
        Relevant contents of `.backportrc.json` (project config) and/or
        `~/.backport/config.json` (global config). **Replace your
        `accessToken` with REDACTED before posting.**
      render: json
    validations:
      required: false

  - type: textarea
    id: verbose-output
    attributes:
      label: Output with --verbose
      description: >-
        Re-run the command with the `--verbose` flag and paste the output.
        Double-check that no access token appears in the output.
      render: shell
    validations:
      required: true

  - type: textarea
    id: expected-vs-actual
    attributes:
      label: Expected vs actual behavior
      description: What did you expect to happen, and what happened instead?
      placeholder: |
        Expected: ...
        Actual: ...
    validations:
      required: true
